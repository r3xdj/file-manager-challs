services:
  challenge_env:
    build: .
    image: file_manager_2_task_image

  instancer:
    image: alpine
    ports:
      - "10002:10002"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    entrypoint: 
      - sh
      - -c
      - |
        apk add --no-cache socat docker-cli
        socat TCP-LISTEN:10002,reuseaddr,fork EXEC:"docker run -i --rm --network none file_manager_2_task_image"